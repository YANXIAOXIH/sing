[custom]
; ================= 1. 局域网直连 =================
ruleset=🎯 全球直连,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/LocalAreaNetwork.list

; ================= 2. 广告拦截 =================
; ruleset=🛑 广告拦截,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/BanAD.list
; ruleset=🛑 广告拦截,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/BanProgramAD.list

; ================= 3. 特定服务分流 =================
ruleset=📢 谷歌FCM,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Ruleset/GoogleFCM.list
ruleset=🎥 TikTok,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Ruleset/TikTok.list
ruleset=🎥 NETFLIX,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Ruleset/Netflix.list
ruleset=🎥 NETFLIX,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Ruleset/DisneyPlus.list
ruleset=🤖 人工智能,https://raw.githubusercontent.com/juewuy/ShellClash/master/rules/ai.list
ruleset=Ⓜ️ 微软服务,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Microsoft.list
ruleset=🍎 苹果服务,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Apple.list
ruleset=📲 电报消息,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Telegram.list
ruleset=🌍 国外媒体,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/ProxyMedia.list

; ================= 4. 主要外网节点规则 =================
ruleset=🚀 节点选择,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/ProxyLite.list

; ================= 5. 国内直连优化 =================
ruleset=🎯 全球直连,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/GoogleCN.list
ruleset=🎯 全球直连,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/ChinaDomain.list

; ================= 6. 兜底规则 =================
ruleset=🐟 漏网之鱼,[]FINAL

; ================= 策略组设置 =================

; 【全局与日常】追求低延迟：港台物理距离最近，其次新加坡、日韩
custom_proxy_group=🚀 节点选择`select`[]♻️ 自动选择`[]🇨🇳 港台节点`[]🇸🇬 新加坡节点`[]🇯🇵 日韩节点`[]🇺🇲 美国节点`[]🇹🇭 泰国节点`[]DIRECT
custom_proxy_group=♻️ 自动选择`url-test`.*`http://www.gstatic.com/generate_204`300,,50
;custom_proxy_group=🛑 广告拦截`select`[]DIRECT`[]REJECT

; 【电报】亚太数据中心主要在新加坡，其次选港台日
custom_proxy_group=📲 电报消息`select`[]🚀 节点选择`[]🇸🇬 新加坡节点`[]🇨🇳 港台节点`[]🇯🇵 日韩节点`[]🇺🇲 美国节点`[]🇹🇭 泰国节点`[]♻️ 自动选择`[]DIRECT

; 【AI大模型】严格封锁中港台，原生美国最佳，新/日韩备选
custom_proxy_group=🤖 人工智能`select`[]🇺🇲 美国节点`[]🇸🇬 新加坡节点`[]🇯🇵 日韩节点

; 【流媒体 Netflix/国外媒体】解锁率和中文字幕优先：新加坡和港台最佳
custom_proxy_group=🎥 NETFLIX`select`[]🎥 流媒体解锁`[]🇸🇬 新加坡节点`[]🇨🇳 港台节点`[]🇯🇵 日韩节点`[]🇺🇲 美国节点`[]🇹🇭 泰国节点`[]🚀 节点选择
custom_proxy_group=🌍 国外媒体`select`[]🚀 节点选择`[]🇸🇬 新加坡节点`[]🇨🇳 港台节点`[]🇯🇵 日韩节点`[]🇺🇲 美国节点`[]🇹🇭 泰国节点`[]♻️ 自动选择`[]DIRECT

; 【TikTok】香港节点通常不可用（黑屏），优先排新加坡/日韩/美国/台湾
custom_proxy_group=🎥 TikTok`select`[]🎥 流媒体解锁`[]🇸🇬 新加坡节点`[]🇯🇵 日韩节点`[]🇺🇲 美国节点`[]🇨🇳 港台节点`[]🇹🇭 泰国节点`[]🚀 节点选择

; 【谷歌/微软/苹果】常规巨头服务，追求低延迟加载，港台/新加坡优先
custom_proxy_group=📢 谷歌FCM`select`[]🚀 节点选择`[]DIRECT`[]🇨🇳 港台节点`[]🇸🇬 新加坡节点`[]🇯🇵 日韩节点`[]🇺🇲 美国节点`[]🇹🇭 泰国节点
custom_proxy_group=Ⓜ️ 微软服务`select`[]DIRECT`[]🚀 节点选择`[]🇨🇳 港台节点`[]🇸🇬 新加坡节点`[]🇯🇵 日韩节点`[]🇺🇲 美国节点`[]🇹🇭 泰国节点
custom_proxy_group=🍎 苹果服务`select`[]DIRECT`[]🚀 节点选择`[]🇨🇳 港台节点`[]🇸🇬 新加坡节点`[]🇯🇵 日韩节点`[]🇺🇲 美国节点`[]🇹🇭 泰国节点

; 【兜底】
custom_proxy_group=🎯 全球直连`select`[]DIRECT`[]🚀 节点选择`[]♻️ 自动选择
custom_proxy_group=🐟 漏网之鱼`select`[]🚀 节点选择`[]♻️ 自动选择`[]DIRECT`[]🇨🇳 港台节点`[]🇸🇬 新加坡节点`[]🇯🇵 日韩节点`[]🇺🇲 美国节点`[]🇹🇭 泰国节点

; ================= 节点筛选正则表达式 (按日常使用优先级从上到下视觉排序) =================
custom_proxy_group=🎥 流媒体解锁`select`(NF|原生|奈飞|解锁|流媒|迪士尼|N.*D|Netflix|NETFLIX|Media|Disn|Unlock|Oracle)
custom_proxy_group=🇨🇳 港台节点`url-test`(港|HK|Hong Kong|台|新北|彰化|TW|Taiwan)`http://www.gstatic.com/generate_204`300,,50
custom_proxy_group=🇸🇬 新加坡节点`url-test`(新加坡|坡|狮城|SG|Singapore)`http://www.gstatic.com/generate_204`300,,50
custom_proxy_group=🇯🇵 日韩节点`url-test`(日本|川日|东京|大阪|泉日|埼玉|沪日|深日|[^-]日|JP|Japan|KR|Korea|KOR|首尔|韩|韓)`http://www.gstatic.com/generate_204`300,,50
custom_proxy_group=🇺🇲 美国节点`url-test`(美|波特兰|达拉斯|俄勒冈|凤凰城|费利蒙|硅谷|拉斯维加斯|洛杉矶|圣何塞|圣克拉拉|西雅图|芝加哥|US|United States)`http://www.gstatic.com/generate_204`300,,150
custom_proxy_group=🇹🇭 泰国节点`url-test`(泰国|泰|TH|Thailand)`http://www.gstatic.com/generate_204`300,,50

; ================= 全局参数设置 =================
enable_rule_generator=true
overwrite_original_rules=true
